<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Generator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="header">
    <h1>Traffic Generator Dashboard</h1>
    <button class="btn btn-danger" onclick="stopAll()">Stop All Traffic</button>
</div>

<div class="container">

    <!-- Stats -->
    <div class="card">
        <div class="card-header" onclick="toggleSection('stats')">
            <span>Live Statistics</span>
            <div style="display:flex;align-items:center;gap:6px" onclick="event.stopPropagation()">
                <button class="btn btn-secondary" onclick="clearStats()" style="padding:3px 10px;font-size:10px">Clear Stats</button>
                <span class="chevron" id="chevron-stats">&#9660;</span>
            </div>
        </div>
        <div class="card-body" id="section-stats">
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-label">Bytes Sent</div><div class="stat-value" id="stat-sent">0 B</div></div>
                <div class="stat-box"><div class="stat-label">Bytes Received</div><div class="stat-value" id="stat-recv">0 B</div></div>
                <div class="stat-box"><div class="stat-label">Requests</div><div class="stat-value" id="stat-reqs">0</div></div>
                <div class="stat-box"><div class="stat-label">Errors</div><div class="stat-value" id="stat-errors">0</div></div>
            </div>
        </div>
    </div>

    <!-- Traffic Topology -->
    <div class="card">
        <div class="card-header" onclick="toggleSection('topology')">
            <span>Traffic Topology</span>
            <div style="display:flex;align-items:center;gap:6px" onclick="event.stopPropagation()">
                <button class="btn btn-secondary" onclick="refreshTopology()" style="padding:3px 10px;font-size:10px">Refresh</button>
                <span class="chevron collapsed" id="chevron-topology">&#9660;</span>
            </div>
        </div>
        <div class="card-body collapsed" id="section-topology">
            <div id="topology-container" style="width:100%;height:450px;border:1px solid var(--border);border-radius:6px;background:var(--bg-sub)"></div>
        </div>
    </div>

    <!-- Router Link Simulation -->
    <div class="card">
        <div class="card-header" onclick="toggleSection('routers')">
            <span>Link Simulation — Routers</span>
            <span class="chevron" id="chevron-routers">&#9660;</span>
        </div>
        <div class="card-body" id="section-routers">
            <!-- Add Router Form -->
            <div style="margin-bottom:12px;padding:10px;background:var(--bg-sub);border:1px solid var(--border);border-radius:6px">
                <label style="font-size:11px;font-weight:600;margin-bottom:6px;display:block;color:var(--text-secondary)">Add Router</label>
                <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
                    <input type="text" id="router-add-name" placeholder="Name" style="width:110px;padding:4px 8px;font-size:11px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px">
                    <input type="text" id="router-add-ip" placeholder="Router IP" style="width:130px;padding:4px 8px;font-size:11px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px">
                    <input type="text" id="router-add-user" placeholder="Username" style="width:100px;padding:4px 8px;font-size:11px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px">
                    <input type="password" id="router-add-pass" placeholder="Password" style="width:100px;padding:4px 8px;font-size:11px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px">
                    <button class="btn btn-start" onclick="addRouter()">Add</button>
                </div>
                <div id="router-add-error" style="display:none;margin-top:4px;font-size:11px;color:var(--danger)"></div>
            </div>
            <!-- Router Cards Container -->
            <div id="router-cards-container"></div>
        </div>
    </div>

    <!-- Source IPs -->
    <div class="card">
        <div class="card-header" onclick="toggleSection('sourceip')">
            <span>Source IP Simulation</span>
            <span class="chevron collapsed" id="chevron-sourceip">&#9660;</span>
        </div>
        <div class="card-body collapsed" id="section-sourceip">
            <div style="padding:8px;background:var(--bg-sub);border:1px solid var(--border);border-radius:6px">
                <label style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                    <input type="checkbox" id="source-ip-toggle">
                    <strong style="font-size:12px">Random Source IPs</strong> <span style="font-size:11px;color:var(--text-secondary)">(simulate multiple clients)</span>
                </label>
                <div id="source-ip-config" style="display:none;margin-top:6px">
                    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                        <label style="font-size:11px;color:var(--text-secondary)">Base IP</label>
                        <input type="text" id="source-ip-base" value="172.18.0.100" style="width:130px;padding:4px 8px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;font-size:12px">
                        <label style="font-size:11px;color:var(--text-secondary)">Count</label>
                        <input type="number" id="source-ip-count" value="5" min="1" max="50" style="width:55px;padding:4px 8px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;font-size:12px">
                        <button class="btn btn-primary" onclick="applySourceIps()" style="padding:4px 10px">Apply</button>
                    </div>
                    <div id="source-ip-list" style="margin-top:6px;font-size:10px;color:var(--text-secondary)"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Proxy Configuration -->
    <div class="card">
        <div class="card-header" onclick="toggleSection('proxy')">
            <span>Proxy Configuration</span>
            <span class="chevron collapsed" id="chevron-proxy">&#9660;</span>
        </div>
        <div class="card-body collapsed" id="section-proxy">
            <div style="padding:8px;background:var(--bg-sub);border:1px solid var(--border);border-radius:6px">
                <label style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
                    <input type="checkbox" id="proxy-enabled">
                    <strong style="font-size:12px">Enable Proxy</strong>
                    <span style="font-size:11px;color:var(--text-secondary)">(route traffic via proxy server)</span>
                </label>
                <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 8px;align-items:center;font-size:12px">
                    <label style="color:var(--text-secondary)">Type</label>
                    <select id="proxy-type" style="padding:4px 8px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;font-size:12px">
                        <option value="http">HTTP/HTTPS</option>
                        <option value="socks5">SOCKS5</option>
                    </select>
                    <label style="color:var(--text-secondary)">Host</label>
                    <input type="text" id="proxy-host" placeholder="proxy.example.com" style="padding:4px 8px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;font-size:12px">
                    <label style="color:var(--text-secondary)">Port</label>
                    <input type="number" id="proxy-port" value="8080" style="padding:4px 8px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;font-size:12px;width:100px">
                    <label style="color:var(--text-secondary)">Username</label>
                    <input type="text" id="proxy-username" placeholder="(optional)" style="padding:4px 8px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;font-size:12px">
                    <label style="color:var(--text-secondary)">Password</label>
                    <input type="password" id="proxy-password" placeholder="(optional)" style="padding:4px 8px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;font-size:12px">
                </div>
                <div style="margin-top:8px;display:flex;gap:6px">
                    <button class="btn btn-primary" onclick="saveProxy()" style="padding:4px 12px">Apply</button>
                    <button class="btn btn-secondary" id="proxy-test-btn" onclick="testProxy()" style="padding:4px 12px">Test</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Protocol Cards -->
    <div class="card">
        <div class="card-header" onclick="toggleSection('protocols')">
            <span>Traffic Generators</span>
            <div style="display:flex;align-items:center;gap:6px" onclick="event.stopPropagation()">
                <div class="bulk-actions">
                    <button class="btn btn-secondary" onclick="selectAll()">Select All</button>
                    <button class="btn btn-secondary" onclick="deselectAll()">Deselect</button>
                    <button class="btn btn-start" onclick="startSelected()">Start Selected</button>
                    <button class="btn btn-stop" onclick="stopSelected()">Stop Selected</button>
                </div>
                <span class="chevron" id="chevron-protocols">&#9660;</span>
            </div>
        </div>
        <div class="card-body" id="section-protocols">
            <div class="protocol-grid" id="protocol-grid"></div>
        </div>
    </div>

    <!-- Security Testing -->
    <div class="card">
        <div class="card-header" onclick="toggleSection('security')">
            <span>Security Testing</span>
            <div style="display:flex;align-items:center;gap:6px" onclick="event.stopPropagation()">
                <button class="btn btn-start" onclick="startSecurityTests()" style="padding:3px 10px;font-size:10px">Run Selected</button>
                <button class="btn btn-stop" onclick="stopSecurityTests()" style="padding:3px 10px;font-size:10px">Stop</button>
                <button class="btn btn-secondary" onclick="clearSecurityResults()" style="padding:3px 10px;font-size:10px">Clear</button>
                <span class="chevron collapsed" id="chevron-security">&#9660;</span>
            </div>
        </div>
        <div class="card-body collapsed" id="section-security">
            <!-- Config -->
            <div class="security-config">
                <label style="font-size:11px;color:var(--text-secondary)">HTTP Port</label>
                <input type="number" id="sec-http-port" value="9999" style="width:70px;padding:3px 6px;font-size:11px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px">
                <label style="font-size:11px;color:var(--text-secondary)">HTTPS Port</label>
                <input type="number" id="sec-https-port" value="443" style="width:70px;padding:3px 6px;font-size:11px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px">
                <label style="font-size:11px;color:var(--text-secondary)">Interval (s)</label>
                <input type="number" id="sec-interval" value="2" step="0.5" style="width:60px;padding:3px 6px;font-size:11px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px">
            </div>
            <!-- Summary bar -->
            <div id="security-summary" style="display:none"></div>
            <!-- Test catalog + results -->
            <div id="security-panel"></div>
        </div>
    </div>

    <!-- Logs -->
    <div class="card">
        <div class="card-header" onclick="toggleSection('logs')">
            <span>Activity Log</span>
            <div style="display:flex;align-items:center;gap:8px" onclick="event.stopPropagation()">
                <label style="display:flex;align-items:center;gap:4px;font-size:11px;font-weight:normal;cursor:pointer;color:var(--text-secondary)">
                    <input type="checkbox" id="auto-refresh-toggle" checked onchange="toggleAutoRefresh()"> Auto-refresh
                </label>
                <button class="btn btn-secondary" onclick="logBuf.length=0;document.getElementById('log-panel').innerHTML=''">Clear</button>
                <span class="chevron collapsed" id="chevron-logs">&#9660;</span>
            </div>
        </div>
        <div class="card-body collapsed" id="section-logs">
            <div class="log-panel" id="log-panel"></div>
        </div>
    </div>

</div>

<script>const SERVER_HOST = {{ server_host | tojson }};</script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
