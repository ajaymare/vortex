# Use this for running both on the same machine (local testing).
# For separate VMs, use docker-compose.server.yml and docker-compose.client.yml

services:
  client:
    build: ./client
    image: ajaymare/vortex-client:latest
    container_name: vortex-client
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      - SERVER_HOST=server
    networks:
      - vortex-net
    depends_on:
      - server
    restart: unless-stopped

  server:
    build: ./server
    image: ajaymare/vortex-server:latest
    container_name: vortex-server
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "8081:80"
      - "8444:443"
      - "5201:5201"
      - "5201:5201/udp"
      - "5202:5202"
      - "5202:5202/udp"
      - "5203:5203"
      - "5203:5203/udp"
      - "5000:5000"
      - "5004-5007:5004-5007/udp"
      - "19999:9999"
      - "53:53/udp"
      - "2121:21"
      - "21100-21110:21100-21110"
      - "2222:2222"
      - "8082:8082"
      - "18443:8443"
    networks:
      - vortex-net
    restart: unless-stopped

networks:
  vortex-net:
    driver: bridge
